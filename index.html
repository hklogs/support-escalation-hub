<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support Escalation Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      body { background: #020617; margin: 0; font-family: system-ui, sans-serif; }
      #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
      #loading > div { text-align: center; color: #94a3b8; font-size: 14px; }
      #loading .spinner { width: 24px; height: 24px; border: 3px solid #1e293b; border-top-color: #34d399; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading"><div><div class="spinner"></div>Loading Support Escalation Hub...</div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
